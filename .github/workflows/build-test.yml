name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Test (.NET 10 SDK)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore SmartWsdlKit.slnx

    - name: Build Solution
      run: dotnet build SmartWsdlKit.slnx --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test SmartWsdlKit.slnx --configuration Release --no-build --verbosity normal
